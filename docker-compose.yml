version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: org_sys_db
    environment:
      POSTGRES_DB: org_sys
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-java:
    build:
      context: ./backend-java
      dockerfile: Dockerfile
    container_name: org_sys_java
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/org_sys
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
    ports:
      - "8080:8080"

  backend-python:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    container_name: org_sys_python
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: org_sys
      DB_USER: postgres
      DB_PASSWORD: 123456
      JWT_SECRET: xiao-sys-secret-key-2026-very-long-secret
      JAVA_SERVICE_URL: http://backend-java:8080
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: org_sys_frontend
    depends_on:
      - backend-java
      - backend-python
    ports:
      - "80:80"

volumes:
  pg_data:
